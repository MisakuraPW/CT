; ============================================================
; paths.example.ini
; 医学图像处理大作业路径配置模板
;
; 使用方法：
; 1. 复制本文件
; 2. 重命名为 paths.local.ini
; 3. 修改其中的数据集路径为本机真实路径
;
; 注意：
; paths.example.ini 需要提交到 Git
; paths.local.ini 不要提交到 Git
; ============================================================

[dataset]

; Finding and Measuring Lungs in CT Data
; 用途：肺实质分割主数据集
; 示例：
; lung_dataset_root = G:/Kaggle/kagglehub/datasets/kmader/finding-lungs-in-ct-data/versions/2
lung_dataset_root = D:/path/to/finding-lungs-in-ct-data

; COVID-19 CT scans
; 用途：COVID-19 感染负荷定量分析
; 示例：
; covid_dataset_root = G:/Kaggle/kagglehub/datasets/andrewmvd/covid19-ct-scans/versions/4
covid_dataset_root = D:/path/to/covid19-ct-scans


[output]

; 程序输出目录
; Visual Studio 调试工作目录建议设置为项目根目录，此时可直接使用 results
result_root = results


[app]

; 是否保存中间处理结果
; 1 = 保存
; 0 = 不保存
save_intermediate = 1

; 默认图像扩展名过滤
image_extensions = .png,.jpg,.jpeg,.bmp,.tif,.tiff

; mask 前景像素值
; 本项目统一规定：
; 前景 = 255
; 背景 = 0
mask_foreground_value = 255


[preprocess]

; 肺窗参数
lung_window_level = -600
lung_window_width = 1500

; 滤波与增强参数，kernel size 会自动修正为不小于 3 的奇数
gaussian_kernel_size = 5
median_kernel_size = 5
clahe_clip_limit = 2.0
clahe_tile_grid_size = 8


[segmentation]

; Otsu 前的高斯平滑核大小
threshold_gaussian_kernel_size = 5

; 连通域筛选
min_component_area = 64
min_component_area_divisor = 1000
keep_component_count = 2

; 形态学修复
open_kernel_size = 3
close_kernel_size = 7
morphology_iterations = 1
